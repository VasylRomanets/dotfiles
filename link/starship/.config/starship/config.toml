"$schema" = 'https://starship.rs/config-schema.json'

# в•ӯв”Җ п„• dotfiles п„Ұ main вҮЈ1вҮЎ2 +1 !2 в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ уұҰҹ 3s пҖ— 12:34
# в•°в”ҖвқҜ

format = """
[в•ӯв”Җ](dimmed white)\
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$cmd_duration\
$time\
$line_break\
[в•°в”Җ](dimmed white)\
$character\
"""

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"

[fill]
style = "dimmed white"
symbol = "в”Җ"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Left в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " у°Ңҫ"
read_only_style = "red"
format = "[ п„• $path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "п„Ұ "
style = "purple"
truncation_length = 32
truncation_symbol = "вҖҰ"
format = "[on ](dimmed white)[$symbol$branch]($style) "

[git_state]
style = "red"
format = "[\\($state( $progress_current/$progress_total)\\)]($style) "
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
ahead = "[вҮЎ${count} ](yellow)"
behind = "[вҮЈ${count} ](yellow)"
diverged = "[вҮЈ${behind_count}вҮЎ${ahead_count} ](yellow)"
stashed = "[*${count} ](yellow)"
conflicted = "[~${count} ](red)"
staged = "[+${count} ](yellow)"
modified = "[!${count} ](yellow)"
deleted = "[-${count} ](red)"
untracked = "[?${count} ](yellow)"
format = """
(\
$ahead_behind\
$stashed\
$conflicted\
$staged\
$modified\
$deleted\
$untracked\
)\
"""

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Right в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
min_time = 3000
style = "dimmed white"
format = "[ уұҰҹ $duration]($style)"

[time]
disabled = false
style = "dimmed white"
time_format = "%H:%M"
format = "[ пҖ— $time]($style)"
